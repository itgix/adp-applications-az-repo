apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-sample-app-2
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: nginx-sample-app-2
    server: https://kubernetes.default.svc
  project: applications
  source:
    path: manifests/deployments
    repoURL: https://dev.azure.com/ITGix/Azure%20Landing%20Zones/_git/adp-apps-client
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true